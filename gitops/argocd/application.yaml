apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-platform-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/agarciafer/devops-platform-gitops.git
    targetRevision: master
    path: gitops/

  destination:
    server: https://kubernetes.default.svc
    namespace: devops-platform

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
